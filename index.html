<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familie Hanst Wochenplan</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f7f7ff;
      padding:20px;
      margin:0;
    }
    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 4px 16px rgba(0,0,0,.06);
    }
    button{
      background:#ef5f95;
      border:none;
      color:white;
      padding:12px 16px;
      border-radius:8px;
      cursor:pointer;
    }
    input{
      padding:12px;
      border-radius:8px;
      border:1px solid #ddd;
      min-width:220px;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    ul{
      padding-left:20px;
    }
    .day{
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .day strong{
      min-width:120px;
    }
  </style>
</head>
<body>

  <h1>💛 Familie Hanst Wochenplan</h1>

  <div class="card">
    <h2>Gericht hinzufügen</h2>
    <div class="row">
      <input id="dishInput" placeholder="Gericht">
      <button id="addBtn" type="button">Hinzufügen</button>
    </div>
  </div>

  <div class="card">
    <h2>Gerichte</h2>
    <ul id="dishList"></ul>
  </div>

  <div class="card">
    <h2>Wochenplan</h2>
    <button id="randomBtn" type="button">🎲 Zufallsplan</button>
    <div style="margin-top:16px;" id="weekBox"></div>
  </div>

  <script>
    const STORAGE_KEY = "familie_hanst_wochenplan_v1";
    const DAYS = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

    let dishes = [];
    let week = Array(7).fill("");

    function saveData(){
      const payload = { dishes, week };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function loadData(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        const data = JSON.parse(raw);
        dishes = Array.isArray(data.dishes) ? data.dishes : [];
        week = Array.isArray(data.week) && data.week.length === 7 ? data.week : Array(7).fill("");
      }catch(e){
        dishes = [];
        week = Array(7).fill("");
      }
    }

    function renderDishes(){
      const list = document.getElementById("dishList");
      list.innerHTML = "";

      if(!dishes.length){
        list.innerHTML = "<li>Noch keine Gerichte.</li>";
        return;
      }

      dishes.forEach((dish, index) => {
        const li = document.createElement("li");
        li.textContent = dish + " ";

        const delBtn = document.createElement("button");
        delBtn.textContent = "Löschen";
        delBtn.style.padding = "6px 10px";
        delBtn.style.fontSize = "12px";
        delBtn.addEventListener("click", () => {
          dishes.splice(index, 1);
          week = week.map(x => x === dish ? "" : x);
          saveData();
          render();
        });

        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    function renderWeek(){
      const box = document.getElementById("weekBox");
      box.innerHTML = "";

      DAYS.forEach((day, i) => {
        const row = document.createElement("div");
        row.className = "day";

        const label = document.createElement("strong");
        label.textContent = day;

        const input = document.createElement("input");
        input.value = week[i] || "";
        input.placeholder = "Gericht";
        input.addEventListener("input", (e) => {
          week[i] = e.target.value;
          saveData();
        });

        row.appendChild(label);
        row.appendChild(input);
        box.appendChild(row);
      });
    }

    function addDish(){
      const input = document.getElementById("dishInput");
      const name = input.value.trim();
      if(!name) return;

      dishes.push(name);
      input.value = "";
      saveData();
      render();
    }

    function randomWeek(){
      if(!dishes.length){
        alert("Bitte zuerst Gerichte anlegen.");
        return;
      }

      week = DAYS.map(() => dishes[Math.floor(Math.random() * dishes.length)]);
      saveData();
      renderWeek();
    }

    function render(){
      renderDishes();
      renderWeek();
    }

    document.getElementById("addBtn").addEventListener("click", addDish);
    document.getElementById("randomBtn").addEventListener("click", randomWeek);

    document.getElementById("dishInput").addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        addDish();
      }
    });

    loadData();
    render();
  </script>

</body>
</html>
