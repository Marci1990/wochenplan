<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familie Hanst Wochenplan</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f7f7ff;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
background:#ef5f95;
border:none;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<h1>💛 Familie Hanst Wochenplan</h1>

<div class="card">
<h2>Gericht hinzufügen</h2>

<input id="dishInput" placeholder="Gericht">
<button onclick="addDish()">Hinzufügen</button>

</div>

<div class="card">
<h2>Gerichte</h2>
<ul id="dishList"></ul>
</div>

<script>

const supabaseUrl = "DEINE_SUPABASE_URL"
const supabaseKey = "DEIN_SUPABASE_ANON_KEY"

const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)

const APP_STATE_ID="familie-hanst-main"

let dishes=[]

async function saveData(){

const payload={dishes}

await supabase
.from("app_state")
.upsert({
id:APP_STATE_ID,
data:payload,
updated_at:new Date().toISOString()
})

}

async function loadData(){

const {data}=await supabase
.from("app_state")
.select("data")
.eq("id",APP_STATE_ID)
.maybeSingle()

if(data && data.data){
dishes=data.data.dishes || []
render()
}

}

function addDish(){

const input=document.getElementById("dishInput")

if(!input.value)return

dishes.push(input.value)

input.value=""

render()
saveData()

}

function render(){

const list=document.getElementById("dishList")

list.innerHTML=""

dishes.forEach(d=>{

const li=document.createElement("li")
li.textContent=d

list.appendChild(li)

})

}

loadData()

</script>

</body>
</html>
