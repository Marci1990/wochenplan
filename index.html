<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Familie Hanst Wochenplan</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://rtcutlvjjxzmgzyavjjm.supabase.co"
const supabaseKey = "sb_publishable_wikNob0vjfIaYgGXODZ_-Q_A4kS9A2o"

const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)

const APP_ID = "familie-hanst-main"

let dishes = []
let week = Array(7).fill("")

const DAYS = [
"Montag",
"Dienstag",
"Mittwoch",
"Donnerstag",
"Freitag",
"Samstag",
"Sonntag"
]

function buildState(){
return {
dishes,
week
}
}

function applyState(data){

dishes = data.dishes || []
week = data.week || Array(7).fill("")

}

async function saveData(){

const payload = buildState()

await supabase
.from("app_state")
.upsert(
{
id:APP_ID,
data:payload,
updated_at:new Date().toISOString()
},
{
onConflict:"id"
}
)

}

async function loadData(){

const {data} = await supabase
.from("app_state")
.select("data")
.eq("id",APP_ID)
.maybeSingle()

if(data && data.data){

applyState(data.data)

}else{

await saveData()

}

}

function addDish(){

const name = document.getElementById("dishName").value.trim()

if(!name) return

dishes.push({
name:name
})

document.getElementById("dishName").value=""

saveData()

render()

}

function updateDay(i,val){

week[i] = val

saveData()

}

function renderDishes(){

const box = document.getElementById("dishList")

box.innerHTML=""

dishes.forEach(d => {

const div = document.createElement("div")

div.className="box"

div.textContent = d.name

box.appendChild(div)

})

}

function renderWeek(){

const box = document.getElementById("week")

box.innerHTML=""

DAYS.forEach((day,i)=>{

const div = document.createElement("div")

div.className="box"

div.innerHTML=`
<strong>${day}</strong>
<input value="${week[i] || ""}" oninput="updateDay(${i},this.value)">
`

box.appendChild(div)

})

}

function render(){

renderDishes()
renderWeek()

}

document.addEventListener("DOMContentLoaded",async()=>{

await loadData()

render()

})

</script>

<style>

body{
font-family:Arial;
background:#f7f7ff;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.box{
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:10px 14px;
border:none;
background:#ef5f95;
color:white;
border-radius:8px;
cursor:pointer;
}

input{
padding:10px;
margin-top:6px;
margin-bottom:6px;
width:100%;
border-radius:8px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<h1>💛 Familie Hanst Wochenplan</h1>

<div class="card">

<h3>Gericht hinzufügen</h3>

<input id="dishName" placeholder="Gericht">

<button onclick="addDish()">Hinzufügen</button>

</div>

<div class="card">

<h3>Gespeicherte Gerichte</h3>

<div id="dishList"></div>

</div>

<div class="card">

<h3>Wochenplan</h3>

<div id="week"></div>

</div>

</body>
</html>
