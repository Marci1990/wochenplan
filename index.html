
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familie Hanst Wochenplan V10</title>

<style>
body{font-family:Arial;background:#f7f7ff;margin:0;padding:20px}
h1{margin-top:0}
.card{background:white;padding:20px;margin-bottom:20px;border-radius:12px}
button{background:#ef5f95;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
button.small{padding:4px 8px;font-size:12px}
input,textarea{padding:8px;margin:5px;width:100%}
.list div{margin-bottom:8px;padding:6px;border-bottom:1px solid #eee}
.fav{color:#d88b00;font-weight:bold}
</style>
</head>

<body>

<h1>💛 Familie Hanst Wochenplan</h1>

<div class="card">
<h3>Gericht hinzufügen</h3>
<input id="dishName" placeholder="Gericht">
<textarea id="dishIngredients" placeholder="Zutaten (eine pro Zeile)"></textarea>
<button onclick="addDish()">Speichern</button>
</div>

<div class="card">
<h3>Gespeicherte Gerichte</h3>
<div id="dishList" class="list"></div>
</div>

<div class="card">
<h3>Was kann ich heute aus folgenden Zutaten kochen?</h3>
<textarea id="ideaInput" placeholder="z.B. Eier, Käse, Tomaten"></textarea>
<button onclick="findIdeas()">Vorschläge anzeigen</button>
<div id="ideaResults"></div>
</div>

<div class="card">
<h3>Einkaufsliste</h3>
<input id="shopQuick" placeholder="Artikel schnell hinzufügen (z.B. Tomaten 4 Stück)" onkeydown="quickAdd(event)">
<div id="shopList"></div>
</div>

<script>

let state={
dishes:[],
shopping:[]
}

function save(){
localStorage.setItem("hanst_plan",JSON.stringify(state))
}

function load(){
const d=localStorage.getItem("hanst_plan")
if(d)state=JSON.parse(d)
}

function addDish(){

const name=document.getElementById("dishName").value.trim()
const ing=document.getElementById("dishIngredients").value.split("\n").filter(x=>x)

if(!name)return

state.dishes.push({
name:name,
ingredients:ing,
fav:false
})

document.getElementById("dishName").value=""
document.getElementById("dishIngredients").value=""

save()
render()
}

function toggleFav(i){
state.dishes[i].fav=!state.dishes[i].fav
save()
render()
}

function render(){

const box=document.getElementById("dishList")
box.innerHTML=""

state.dishes.forEach((d,i)=>{

const div=document.createElement("div")

div.innerHTML=`
${d.fav?"⭐":""}<b>${d.name}</b>
<button class="small" onclick="toggleFav(${i})">Favorit</button>
`

box.appendChild(div)

})

renderShop()

}

function quickAdd(e){

if(e.key!="Enter")return

const val=document.getElementById("shopQuick").value.trim()

if(!val)return

state.shopping.push(val)

document.getElementById("shopQuick").value=""

save()
renderShop()

}

function renderShop(){

const box=document.getElementById("shopList")
box.innerHTML=""

state.shopping.forEach((s,i)=>{

const div=document.createElement("div")

div.innerHTML=`
${s}
<button class="small" onclick="editShop(${i})">ändern</button>
<button class="small" onclick="deleteShop(${i})">x</button>
`

box.appendChild(div)

})

}

function editShop(i){

const val=prompt("Artikel ändern",state.shopping[i])

if(val!==null){
state.shopping[i]=val
save()
renderShop()
}

}

function deleteShop(i){
state.shopping.splice(i,1)
save()
renderShop()
}

function findIdeas(){

const input=document.getElementById("ideaInput").value.toLowerCase()

const ingredients=input.split(/,|\n/).map(x=>x.trim()).filter(x=>x)

const results=[]

state.dishes.forEach(d=>{

let score=0

d.ingredients.forEach(i=>{
if(ingredients.includes(i.toLowerCase()))score++
})

if(score>0){
results.push({name:d.name,score:score})
}

})

results.sort((a,b)=>b.score-a.score)

const box=document.getElementById("ideaResults")
box.innerHTML=""

if(results.length){

results.forEach(r=>{

const div=document.createElement("div")
div.innerHTML=`${r.name} (${r.score} Zutaten passen)`
box.appendChild(div)

})

}else{

const ideas=[
"Omelette",
"Nudelpfanne",
"Wraps",
"Reispfanne",
"Gemüsepfanne"
]

ideas.forEach(i=>{

const div=document.createElement("div")
div.innerHTML=i+" (KI Vorschlag)"
box.appendChild(div)

})

}

}

load()
render()

</script>

</body>
</html>
