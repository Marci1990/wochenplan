<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Familie Hanst Wochenplan</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#f6f7fb;
margin:0;
padding:25px;
}

h1{
font-size:34px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
width:200px;
}

button{
background:#ff4f8b;
color:white;
border:none;
padding:14px 18px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

ul{
padding-left:20px;
}

li{
margin-bottom:8px;
font-size:17px;
}

.day{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.day strong{
width:110px;
}

.delete{
background:#eee;
color:black;
font-size:12px;
padding:6px 10px;
margin-left:10px;
}

</style>
</head>

<body>

<h1>💛 Familie Hanst Wochenplan</h1>

<div class="card">

<h2>Gericht hinzufügen</h2>

<input id="dishInput" placeholder="z.B. Spaghetti">

<button onclick="addDish()">
Hinzufügen
</button>

</div>


<div class="card">

<h2>Gerichte</h2>

<ul id="dishList"></ul>

</div>


<div class="card">

<h2>Wochenplan</h2>

<button onclick="randomWeek()">
🎲 Zufallsplan
</button>

<div id="weekBox" style="margin-top:20px"></div>

</div>


<script>

let dishes = JSON.parse(localStorage.getItem("dishes")||"[]")
let week = JSON.parse(localStorage.getItem("week")||"[]")

if(week.length===0){
week = ["","","","","","",""]
}

function save(){

localStorage.setItem("dishes",JSON.stringify(dishes))
localStorage.setItem("week",JSON.stringify(week))

}

function addDish(){

let input=document.getElementById("dishInput")

let name=input.value.trim()

if(!name)return

dishes.push(name)

input.value=""

save()

render()

}

function deleteDish(i){

let removed=dishes[i]

dishes.splice(i,1)

week=week.map(x=>x===removed?"":x)

save()

render()

}

function render(){

let list=document.getElementById("dishList")

list.innerHTML=""

if(dishes.length===0){

list.innerHTML="<li>Noch keine Gerichte</li>"

}

dishes.forEach((d,i)=>{

let li=document.createElement("li")

li.innerHTML=

d+

` <button class="delete" onclick="deleteDish(${i})">löschen</button>`

list.appendChild(li)

})

renderWeek()

}

function renderWeek(){

let box=document.getElementById("weekBox")

box.innerHTML=""

let days=[

"Montag",

"Dienstag",

"Mittwoch",

"Donnerstag",

"Freitag",

"Samstag",

"Sonntag"

]

days.forEach((d,i)=>{

let div=document.createElement("div")

div.className="day"

div.innerHTML=

`<strong>${d}</strong>
<input value="${week[i]||""}" 
oninput="updateDay(${i},this.value)">`

box.appendChild(div)

})

}

function updateDay(i,val){

week[i]=val

save()

}

function randomWeek(){

if(dishes.length===0){

alert("Bitte zuerst Gerichte hinzufügen")

return

}

week=week.map(()=>dishes[Math.floor(Math.random()*dishes.length)])

save()

renderWeek()

}

render()

</script>

</body>
</html>
