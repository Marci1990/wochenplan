<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💛 Familie Hanst Wochenplan</title>
  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --pink:#ff4f8b;
      --pink-dark:#e83e79;
      --line:#e9e9ef;
      --soft:#fafafb;
      --green:#e9fff1;
      --yellow:#fff7df;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#fff7fb 0%,#f6f7fb 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1150px;
      margin:0 auto;
      padding:18px;
    }

    .hero{
      background:linear-gradient(135deg,#ff8db3,#ff4f8b 60%,#9da8ff);
      color:#fff;
      border-radius:24px;
      padding:22px;
      margin-bottom:16px;
      box-shadow:0 16px 40px rgba(255,79,139,.18);
    }

    .hero h1{
      margin:0 0 6px;
      font-size:clamp(28px,5vw,40px);
    }

    .hero p{
      margin:0;
      opacity:.95;
    }

    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.05);
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:16px;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    @media (max-width:950px){
      .grid,.grid2{grid-template-columns:1fr;}
    }

    h2,h3{
      margin:0 0 12px;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    input, textarea, select, button{
      font:inherit;
    }

    input, textarea, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:#fff;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      background:var(--pink);
      color:#fff;
      cursor:pointer;
      font-weight:700;
    }

    button:hover{
      background:var(--pink-dark);
    }

    .btn-soft{
      background:#f1f2f7;
      color:#222;
    }

    .btn-soft:hover{
      background:#e6e8f0;
    }

    .btn-small{
      padding:8px 10px;
      border-radius:10px;
      font-size:13px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .recipe, .week-row, .shop-item, .stock-item, .manual-item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:var(--soft);
    }

    .recipe-name{
      font-weight:800;
      font-size:17px;
    }

    .meta{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
      white-space:pre-wrap;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .day{
      display:grid;
      grid-template-columns:110px 1fr auto;
      gap:10px;
      align-items:start;
    }

    @media (max-width:700px){
      .day{grid-template-columns:1fr;}
    }

    .empty{
      color:var(--muted);
      font-size:14px;
    }

    .status{
      color:var(--muted);
      font-size:14px;
      margin-top:8px;
    }

    .hint{
      background:var(--yellow);
      border:1px solid #f3df9c;
      color:#7b5a00;
      border-radius:14px;
      padding:10px 12px;
      font-size:14px;
      margin-bottom:10px;
    }

    .ok{
      background:var(--green);
      border:1px solid #bfe7cb;
      color:#17633f;
      border-radius:14px;
      padding:10px 12px;
      font-size:14px;
      margin-bottom:10px;
    }

    .tag{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:#ffe7f0;
      color:#c62f6d;
      font-size:12px;
      font-weight:700;
      margin-right:6px;
    }

    .area-title{
      font-weight:800;
      margin-top:12px;
      margin-bottom:8px;
    }

    .checkbox-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
    }

    .checkbox-row input[type="checkbox"]{
      width:auto;
      margin-top:4px;
    }

    .done{
      opacity:.55;
      text-decoration:line-through;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>💛 Familie Hanst Wochenplan</h1>
      <p>Synchronisiert für euch beide über Firebase.</p>
    </section>

    <div class="topbar">
      <button id="randomWeekBtn" type="button">🎲 Zufallsplan</button>
      <button id="clearWeekBtn" class="btn-soft" type="button">Wochenplan leeren</button>
      <button id="loadExamplesBtn" class="btn-soft" type="button">Beispielgerichte laden</button>
    </div>

    <div class="grid">
      <div>
        <section class="card">
          <h2>Gericht hinzufügen</h2>

          <div class="row">
            <input id="dishName" placeholder="z. B. Spaghetti Bolognese">
          </div>

          <div class="row" style="margin-top:10px;">
            <textarea id="dishIngredients" placeholder="Zutaten, eine pro Zeile:
Spaghetti
Hackfleisch
Tomatensoße
Zwiebeln"></textarea>
          </div>

          <div class="row" style="margin-top:10px;">
            <input id="dishHint" placeholder="Hinweis, z. B. Fleisch morgens auftauen">
          </div>

          <div class="row" style="margin-top:10px;">
            <button id="addDishBtn" type="button">Hinzufügen</button>
          </div>

          <div id="status" class="status">Verbinde mit Firebase…</div>
        </section>

        <section class="card">
          <h2>Gerichte</h2>
          <div id="dishList" class="list"></div>
        </section>
      </div>

      <div>
        <section class="card">
          <h2>Wochenplan</h2>
          <div id="weekBox" class="list"></div>
        </section>

        <section class="card">
          <h2>Einkaufsliste</h2>
          <div class="hint">Die Liste entsteht aus den geplanten Gerichten minus Vorrat plus manuelle Artikel.</div>
          <div id="shoppingList"></div>
        </section>
      </div>
    </div>

    <div class="grid2">
      <section class="card">
        <h2>Vorrat</h2>
        <div class="row">
          <input id="stockInput" placeholder="z. B. Zwiebeln">
          <button id="addStockBtn" type="button">Hinzufügen</button>
        </div>
        <div id="stockList" class="list" style="margin-top:12px;"></div>
      </section>

      <section class="card">
        <h2>Manuell zur Einkaufsliste</h2>
        <div class="row">
          <input id="manualInput" placeholder="z. B. Cola">
          <button id="addManualBtn" type="button">Hinzufügen</button>
        </div>
        <div id="manualList" class="list" style="margin-top:12px;"></div>
      </section>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBl3-LMbx6tL5j96sjYvUMXpSF3D8iwS0I",
      authDomain: "wochenplan-hast.firebaseapp.com",
      projectId: "wochenplan-hast",
      storageBucket: "wochenplan-hast.firebasestorage.app",
      messagingSenderId: "909844114392",
      appId: "1:909844114392:web:5554d7fad278c6ce5da0ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const APP_DOC = doc(db, "apps", "familie-hanst-main");

    const DAYS = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
    const AREAS = [
      "Geplant",
      "Manuell"
    ];

    let state = {
      dishes: [],
      week: ["","","","","","",""],
      stock: [],
      manual: [],
      checked: {}
    };

    const statusBox = document.getElementById("status");
    const dishList = document.getElementById("dishList");
    const weekBox = document.getElementById("weekBox");
    const shoppingList = document.getElementById("shoppingList");
    const stockList = document.getElementById("stockList");
    const manualList = document.getElementById("manualList");

    function setStatus(text){
      statusBox.textContent = text;
    }

    function escapeHtml(text){
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalize(text){
      return String(text || "").trim();
    }

    function uniqueId(){
      return Date.now().toString() + Math.random().toString(36).slice(2,7);
    }

    function uniqueSorted(arr){
      return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,"de"));
    }

    function getRecipeByName(name){
      return state.dishes.find(d => d.name === name) || null;
    }

    async function saveState(){
      try{
        await setDoc(APP_DOC, state);
        setStatus("Gespeichert ✅");
      }catch(err){
        console.error(err);
        setStatus("Fehler beim Speichern");
      }
    }

    function searchGoogle(name){
      window.open("https://www.google.com/search?q=" + encodeURIComponent(name + " Rezept"), "_blank");
    }

    function searchChefkoch(name){
      window.open("https://www.chefkoch.de/rs/s0/" + encodeURIComponent(name) + "/Rezepte.html", "_blank");
    }

    function searchThermomix(name){
      window.open("https://www.rezeptwelt.de/suche?q=" + encodeURIComponent(name), "_blank");
    }

    function renderDishes(){
      dishList.innerHTML = "";

      if(!state.dishes.length){
        dishList.innerHTML = '<div class="empty">Noch keine Gerichte vorhanden.</div>';
        return;
      }

      state.dishes.forEach((dish, index) => {
        const box = document.createElement("div");
        box.className = "recipe";
        box.innerHTML = `
          <div class="recipe-name">${escapeHtml(dish.name)}</div>
          ${dish.ingredients.length ? `<div class="meta">${escapeHtml(dish.ingredients.join(", "))}</div>` : ""}
          ${dish.hint ? `<div class="ok" style="margin-top:10px;">Hinweis: ${escapeHtml(dish.hint)}</div>` : ""}
          <div class="actions">
            <button class="btn-small btn-soft" data-google="${index}" type="button">Google</button>
            <button class="btn-small btn-soft" data-chef="${index}" type="button">Chefkoch</button>
            <button class="btn-small btn-soft" data-thermo="${index}" type="button">Thermomix</button>
            <button class="btn-small btn-soft" data-del="${index}" type="button">Löschen</button>
          </div>
        `;
        dishList.appendChild(box);
      });

      dishList.querySelectorAll("[data-google]").forEach(btn => {
        btn.addEventListener("click", () => searchGoogle(state.dishes[Number(btn.dataset.google)].name));
      });

      dishList.querySelectorAll("[data-chef]").forEach(btn => {
        btn.addEventListener("click", () => searchChefkoch(state.dishes[Number(btn.dataset.chef)].name));
      });

      dishList.querySelectorAll("[data-thermo]").forEach(btn => {
        btn.addEventListener("click", () => searchThermomix(state.dishes[Number(btn.dataset.thermo)].name));
      });

      dishList.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const index = Number(btn.dataset.del);
          const removed = state.dishes[index].name;
          state.dishes.splice(index, 1);
          state.week = state.week.map(x => x === removed ? "" : x);
          renderAll();
          await saveState();
        });
      });
    }

    function renderWeek(){
      weekBox.innerHTML = "";

      DAYS.forEach((day, i) => {
        const meal = state.week[i] || "";
        const recipe = getRecipeByName(meal);

        const options = state.dishes
          .map(d => `<option value="${escapeHtml(d.name)}" ${meal === d.name ? "selected" : ""}>${escapeHtml(d.name)}</option>`)
          .join("");

        const row = document.createElement("div");
        row.className = "week-row day";
        row.innerHTML = `
          <strong>${day}</strong>
          <div>
            <input value="${escapeHtml(meal)}" placeholder="Gericht" data-input="${i}">
            <div style="margin-top:8px;">
              <select data-select="${i}">
                <option value="">Gespeichertes Gericht wählen</option>
                ${options}
              </select>
            </div>
            ${recipe && recipe.hint ? `<div class="meta" style="margin-top:8px;">💡 ${escapeHtml(recipe.hint)}</div>` : ""}
          </div>
          <button class="btn-small btn-soft" data-reroll="${i}" type="button">Neu</button>
        `;
        weekBox.appendChild(row);
      });

      weekBox.querySelectorAll("[data-input]").forEach(el => {
        el.addEventListener("input", async () => {
          const i = Number(el.dataset.input);
          state.week[i] = el.value.trim();
          renderShopping();
          await saveState();
        });
      });

      weekBox.querySelectorAll("[data-select]").forEach(el => {
        el.addEventListener("change", async () => {
          const i = Number(el.dataset.select);
          state.week[i] = el.value;
          renderWeek();
          renderShopping();
          await saveState();
        });
      });

      weekBox.querySelectorAll("[data-reroll]").forEach(el => {
        el.addEventListener("click", async () => {
          if(!state.dishes.length) return;
          const i = Number(el.dataset.reroll);
          state.week[i] = state.dishes[Math.floor(Math.random() * state.dishes.length)].name;
          renderWeek();
          renderShopping();
          await saveState();
        });
      });
    }

    function renderShopping(){
      shoppingList.innerHTML = "";

      const plannedIngredients = state.week
        .filter(Boolean)
        .map(name => getRecipeByName(name))
        .filter(Boolean)
        .flatMap(recipe => recipe.ingredients || []);

      const stockLower = state.stock.map(x => x.toLowerCase());

      const filteredPlanned = uniqueSorted(plannedIngredients)
        .filter(item => !stockLower.includes(item.toLowerCase()));

      const manualItems = uniqueSorted(state.manual);

      const groups = {
        Geplant: filteredPlanned,
        Manuell: manualItems
      };

      let hasAnything = false;

      AREAS.forEach(area => {
        const items = groups[area];
        if(!items.length) return;

        hasAnything = true;

        const title = document.createElement("div");
        title.className = "area-title";
        title.textContent = area;
        shoppingList.appendChild(title);

        items.forEach(item => {
          const key = area + "::" + item;
          const checked = !!state.checked[key];

          const row = document.createElement("div");
          row.className = "shop-item";
          row.innerHTML = `
            <label class="checkbox-row">
              <input type="checkbox" ${checked ? "checked" : ""} data-check="${escapeHtml(key)}">
              <span class="${checked ? "done" : ""}">${escapeHtml(item)}</span>
            </label>
          `;
          shoppingList.appendChild(row);
        });
      });

      if(!hasAnything){
        shoppingList.innerHTML = '<div class="empty">Gerade nichts geplant.</div>';
      }

      shoppingList.querySelectorAll("[data-check]").forEach(el => {
        el.addEventListener("change", async () => {
          const key = el.dataset.check;
          state.checked[key] = el.checked;
          renderShopping();
          await saveState();
        });
      });
    }

    function renderStock(){
      stockList.innerHTML = "";

      if(!state.stock.length){
        stockList.innerHTML = '<div class="empty">Noch nichts im Vorrat.</div>';
        return;
      }

      state.stock.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "stock-item";
        row.innerHTML = `
          <div>${escapeHtml(item)}</div>
          <button class="btn-small btn-soft" data-del-stock="${index}" type="button">Löschen</button>
        `;
        stockList.appendChild(row);
      });

      stockList.querySelectorAll("[data-del-stock]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const index = Number(btn.dataset.delStock);
          state.stock.splice(index, 1);
          renderStock();
          renderShopping();
          await saveState();
        });
      });
    }

    function renderManual(){
      manualList.innerHTML = "";

      if(!state.manual.length){
        manualList.innerHTML = '<div class="empty">Noch keine manuellen Artikel.</div>';
        return;
      }

      state.manual.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "manual-item";
        row.innerHTML = `
          <div>${escapeHtml(item)}</div>
          <button class="btn-small btn-soft" data-del-manual="${index}" type="button">Löschen</button>
        `;
        manualList.appendChild(row);
      });

      manualList.querySelectorAll("[data-del-manual]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const index = Number(btn.dataset.delManual);
          state.manual.splice(index, 1);
          renderManual();
          renderShopping();
          await saveState();
        });
      });
    }

    function renderAll(){
      renderDishes();
      renderWeek();
      renderShopping();
      renderStock();
      renderManual();
    }

    document.getElementById("addDishBtn").addEventListener("click", async () => {
      const name = normalize(document.getElementById("dishName").value);
      const ingredientsRaw = document.getElementById("dishIngredients").value;
      const hint = normalize(document.getElementById("dishHint").value);

      if(!name) return;

      if(state.dishes.some(d => d.name.toLowerCase() === name.toLowerCase())){
        setStatus("Gericht gibt es schon");
        return;
      }

      const ingredients = ingredientsRaw
        .split("\n")
        .map(x => normalize(x))
        .filter(Boolean);

      state.dishes.push({ name, ingredients, hint });
      state.dishes.sort((a,b)=>a.name.localeCompare(b.name,"de"));

      document.getElementById("dishName").value = "";
      document.getElementById("dishIngredients").value = "";
      document.getElementById("dishHint").value = "";

      renderAll();
      await saveState();
    });

    document.getElementById("addStockBtn").addEventListener("click", async () => {
      const name = normalize(document.getElementById("stockInput").value);
      if(!name) return;
      state.stock.push(name);
      state.stock = uniqueSorted(state.stock);
      document.getElementById("stockInput").value = "";
      renderStock();
      renderShopping();
      await saveState();
    });

    document.getElementById("addManualBtn").addEventListener("click", async () => {
      const name = normalize(document.getElementById("manualInput").value);
      if(!name) return;
      state.manual.push(name);
      state.manual = uniqueSorted(state.manual);
      document.getElementById("manualInput").value = "";
      renderManual();
      renderShopping();
      await saveState();
    });

    document.getElementById("randomWeekBtn").addEventListener("click", async () => {
      if(!state.dishes.length){
        alert("Bitte zuerst Gerichte hinzufügen.");
        return;
      }
      state.week = DAYS.map(() => state.dishes[Math.floor(Math.random() * state.dishes.length)].name);
      renderAll();
      await saveState();
    });

    document.getElementById("clearWeekBtn").addEventListener("click", async () => {
      state.week = ["","","","","","",""];
      state.checked = {};
      renderAll();
      await saveState();
    });

    setStatus("Verbinde mit Firebase…");

    onSnapshot(APP_DOC, async (snap) => {
      if(!snap.exists()){
        await setDoc(APP_DOC, state);
        setStatus("Bereit ✅");
        renderAll();
        return;
      }

      const data = snap.data();
      state = {
        dishes: Array.isArray(data.dishes) ? data.dishes : [],
        week: Array.isArray(data.week) && data.week.length === 7 ? data.week : ["","","","","","",""],
        stock: Array.isArray(data.stock) ? data.stock : [],
        manual: Array.isArray(data.manual) ? data.manual : [],
        checked: data.checked && typeof data.checked === "object" ? data.checked : {}
      };

      renderAll();
      setStatus("Synchronisiert ✅");
    }, (err) => {
      console.error(err);
      setStatus("Fehler bei Firebase");
    });
  </script>
</body>
</html>
