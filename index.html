<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Familie Hanst Wochenplan</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBl3-LMbx6tL5j96sjYvUMXpSF3D8iwS0I",
  authDomain: "wochenplan-hast.firebaseapp.com",
  projectId: "wochenplan-hast",
  storageBucket: "wochenplan-hast.firebasestorage.app",
  messagingSenderId: "909844114392",
  appId: "1:909844114392:web:5554d7fad278c6ce5da0ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const stateDoc = doc(db,"apps","familie-hanst-main")

window.appState={
dishes:[],
week:Array(7).fill("")
}

window.saveData=async function(){

await setDoc(stateDoc,window.appState)

}

onSnapshot(stateDoc,(snap)=>{

if(!snap.exists()) return

window.appState=snap.data()

render()

})

</script>

<style>

body{
font-family:Arial;
background:#fff7fb;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
}

button{
padding:10px 16px;
border:none;
background:#ef5f95;
color:white;
border-radius:8px;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<h1>💛 Familie Hanst Wochenplan</h1>

<div class="card">

<h2>Gericht hinzufügen</h2>

<input id="dishName" placeholder="Gericht">

<button onclick="addDish()">Hinzufügen</button>

</div>

<div class="card">

<h2>Gerichte</h2>

<div id="dishList"></div>

</div>

<div class="card">

<h2>Wochenplan</h2>

<button onclick="randomWeek()">🎲 Zufallsplan</button>

<div id="week"></div>

</div>

<script>

const DAYS=[
"Montag",
"Dienstag",
"Mittwoch",
"Donnerstag",
"Freitag",
"Samstag",
"Sonntag"
]

function addDish(){

const name=document.getElementById("dishName").value

if(!name) return

window.appState.dishes.push({name})

document.getElementById("dishName").value=""

saveData()

render()

}

function render(){

renderDishes()
renderWeek()

}

function renderDishes(){

const box=document.getElementById("dishList")

box.innerHTML=""

window.appState.dishes.forEach(d=>{

const div=document.createElement("div")

div.textContent=d.name

box.appendChild(div)

})

}

function renderWeek(){

const box=document.getElementById("week")

box.innerHTML=""

DAYS.forEach((day,i)=>{

const div=document.createElement("div")

div.innerHTML=`
<strong>${day}</strong>
<input value="${window.appState.week[i]||""}" oninput="updateDay(${i},this.value)">
`

box.appendChild(div)

})

}

function updateDay(i,val){

window.appState.week[i]=val

saveData()

}

function randomWeek(){

if(!window.appState.dishes.length) return

window.appState.week=DAYS.map(()=>{

return window.appState.dishes[
Math.floor(Math.random()*window.appState.dishes.length)
].name

})

saveData()

render()

}

render()

</script>

</body>
</html>
