<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Familie Hanst Wochenplan</title>

<style>

body{
font-family:Arial;
background:#f7f7ff;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
}

button{
padding:10px 16px;
border:none;
background:#ef5f95;
color:white;
border-radius:8px;
cursor:pointer;
}

input,textarea{
padding:10px;
margin:5px;
width:100%;
}

</style>
</head>

<body>

<h1>💛 Familie Hanst Wochenplan</h1>

<div class="card">

<h2>Gericht hinzufügen</h2>

<input id="dishName" placeholder="Gericht">

<textarea id="dishIngredients" placeholder="Zutaten (eine pro Zeile)"></textarea>

<input id="dishHint" placeholder="Hinweis (optional)">

<button onclick="addDish()">Hinzufügen</button>

</div>

<div class="card">

<h2>Gerichte</h2>

<div id="dishList"></div>

</div>

<div class="card">

<h2>Wochenplan</h2>

<button onclick="randomWeek()">🎲 Zufallsplan</button>

<div id="week"></div>

</div>

<div class="card">

<h2>Einkaufsliste</h2>

<div id="shopping"></div>

</div>

<div class="card">

<h2>Vorrat</h2>

<input id="stockInput" placeholder="Zutat">
<button onclick="addStock()">Hinzufügen</button>

<div id="stockList"></div>

</div>

<div class="card">

<h2>Manuell zur Einkaufsliste</h2>

<input id="manualInput" placeholder="Artikel">
<button onclick="addManual()">Hinzufügen</button>

<div id="manualList"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBl3-LMbx6tL5j96sjYvUMXpSF3D8iwS0I",
authDomain: "wochenplan-hast.firebaseapp.com",
projectId: "wochenplan-hast",
storageBucket: "wochenplan-hast.firebasestorage.app",
messagingSenderId: "909844114392",
appId: "1:909844114392:web:5554d7fad278c6ce5da0ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const APP_DOC = doc(db,"apps","familie-hanst");

const DAYS = [
"Montag",
"Dienstag",
"Mittwoch",
"Donnerstag",
"Freitag",
"Samstag",
"Sonntag"
]

let state={
dishes:[],
week:Array(7).fill(""),
stock:[],
manual:[]
}

function render(){

renderDishes()
renderWeek()
renderStock()
renderManual()
renderShopping()

}

function renderDishes(){

const box=document.getElementById("dishList")

box.innerHTML=""

state.dishes.forEach((d,i)=>{

const div=document.createElement("div")

div.innerHTML=`
<b>${d.name}</b>
<br>
${d.ingredients.join(", ")}
<br>
<button onclick="searchGoogle('${d.name}')">Google</button>
<button onclick="deleteDish(${i})">Löschen</button>
`

box.appendChild(div)

})

}

function renderWeek(){

const box=document.getElementById("week")

box.innerHTML=""

DAYS.forEach((day,i)=>{

const div=document.createElement("div")

div.innerHTML=`
<strong>${day}</strong>
<input value="${state.week[i]||""}" onchange="updateDay(${i},this.value)">
`

box.appendChild(div)

})

}

function renderStock(){

const box=document.getElementById("stockList")

box.innerHTML=""

state.stock.forEach((s,i)=>{

const div=document.createElement("div")

div.innerHTML=`${s} <button onclick="removeStock(${i})">X</button>`

box.appendChild(div)

})

}

function renderManual(){

const box=document.getElementById("manualList")

box.innerHTML=""

state.manual.forEach((m,i)=>{

const div=document.createElement("div")

div.innerHTML=`${m} <button onclick="removeManual(${i})">X</button>`

box.appendChild(div)

})

}

function renderShopping(){

const box=document.getElementById("shopping")

box.innerHTML=""

let items=[]

state.week.forEach(meal=>{

const dish=state.dishes.find(d=>d.name===meal)

if(dish) items=items.concat(dish.ingredients)

})

items=items.filter(i=>!state.stock.includes(i))

items=items.concat(state.manual)

items=[...new Set(items)]

items.forEach(item=>{

const div=document.createElement("div")

div.innerHTML=`<input type="checkbox"> ${item}`

box.appendChild(div)

})

}

window.addDish=async function(){

const name=document.getElementById("dishName").value
const ingredients=document.getElementById("dishIngredients").value
.split("\n").filter(Boolean)

const hint=document.getElementById("dishHint").value

if(!name)return

state.dishes.push({
name,
ingredients,
hint
})

document.getElementById("dishName").value=""
document.getElementById("dishIngredients").value=""
document.getElementById("dishHint").value=""

await save()

}

window.deleteDish=async function(i){

state.dishes.splice(i,1)

await save()

}

window.updateDay=async function(i,val){

state.week[i]=val

await save()

}

window.addStock=async function(){

const name=document.getElementById("stockInput").value

if(!name)return

state.stock.push(name)

document.getElementById("stockInput").value=""

await save()

}

window.removeStock=async function(i){

state.stock.splice(i,1)

await save()

}

window.addManual=async function(){

const name=document.getElementById("manualInput").value

if(!name)return

state.manual.push(name)

document.getElementById("manualInput").value=""

await save()

}

window.removeManual=async function(i){

state.manual.splice(i,1)

await save()

}

window.randomWeek=async function(){

if(!state.dishes.length)return

state.week=DAYS.map(()=>state.dishes[Math.floor(Math.random()*state.dishes.length)].name)

await save()

}

window.searchGoogle=function(name){

window.open("https://www.google.com/search?q="+name+" rezept")

}

async function save(){

await setDoc(APP_DOC,state)

}

onSnapshot(APP_DOC,(snap)=>{

if(!snap.exists()){

setDoc(APP_DOC,state)
return

}

state=snap.data()

render()

})

</script>

</body>
</html>
